<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - E-Commerce Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>E-Commerce Shop</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </nav>
  </header>
  <main>
    <div class="checkout-wrapper">
      <div class="checkout-container">
        <h2>Complete Your Order</h2>
        <div id="checkout-summary" class="checkout-summary"></div>

        <form id="checkout-form" class="checkout-form">
          <div class="form-section">
            <h3>Shipping Address</h3>
            <div class="form-group">
              <label for="address">Street Address</label>
              <input type="text" id="address" placeholder="123 Main St" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" placeholder="City" required>
              </div>
              <div class="form-group">
                <label for="postalCode">Postal Code</label>
                <input type="text" id="postalCode" placeholder="Postal Code" required>
              </div>
            </div>
            <div class="form-group">
              <label for="country">Country</label>
              <input type="text" id="country" placeholder="Country" required>
            </div>
          </div>

          <div class="form-section">
            <h3>Payment Method</h3>
            <div class="form-group">
              <label for="paymentMethod">Select Payment Method</label>
              <select id="paymentMethod" required>
                <option value="">-- Choose a method --</option>
                <option value="PayPal">PayPal</option>
                <option value="Stripe">Credit/Debit Card (Stripe)</option>
                <option value="UPI">UPI (India)</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block">Place Order</button>
        </form>
      </div>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 e commerce shop</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
